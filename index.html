<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Predictor Tool</title>
    <script src='https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js'></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #game-frame { width: 100%; height: 100%; border: none; }
        #float-panel { 
            position: fixed; top: 150px; left: 10px; width: 180px; 
            background: rgba(0, 0, 0, 0.9); border: 2px solid #00ff00; 
            color: #fff; padding: 12px; border-radius: 12px; 
            z-index: 99999; touch-action: none; text-align: center; font-family: sans-serif;
        }
        button { background: #00ff00; border: none; padding: 10px; width: 100%; margin-top: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; color: #ffcc00; margin-top: 8px; }
        #result-display { font-size: 16px; font-weight:bold; margin: 8px 0; color: #00ff00; }
    </style>
</head>
<body>

<iframe id="game-frame" src="https://hgnice0.com/#/register?invitationCode=283421928122"></iframe>

<div id="float-panel">
    <div style="cursor: move; font-size: 10px; color: #aaa; margin-bottom: 5px;">[ AI প্যানেল - টেনে সরান ]</div>
    <div id="result-display">AI READY</div>
    <button onclick="requestPermission()">১. পারমিশন নিন</button>
    <button onclick="scanScreen()">২. এনালাইসিস</button>
    <div id="status">স্ট্যাটাস: রেডি</div>
</div>

<video id="video" autoplay playsinline style="display:none"></video>

<script>
    const panel = document.getElementById('float-panel');
    const video = document.getElementById('video');

    // প্যানেল ড্র্যাগ করার লজিক
    let isDragging = false;
    panel.addEventListener('touchstart', (e) => isDragging = true);
    document.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        panel.style.top = (e.touches[0].clientY - 30) + 'px';
        panel.style.left = (e.touches[0].clientX - 90) + 'px';
    });
    document.addEventListener('touchend', () => isDragging = false);

    // আপডেট করা পারমিশন লজিক
    async function requestPermission() {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    frameRate: { ideal: 10 }
                },
                audio: false
            });
            
            video.srcObject = stream;
            video.play();
            document.getElementById('status').innerText = "অনুমতি সফল!";
        } catch(err) {
            console.error("Permission error:", err);
            document.getElementById('status').innerText = "পারমিশন পাননি! ব্রাউজার রিস্টার্ট দিন বা ডেস্কটপ মোড অন করুন।";
        }
    }

    // স্ক্রিন স্ক্যানিং লজিক
    async function scanScreen() {
        if (!video.srcObject) { 
            document.getElementById('status').innerText = "আগে ১ নং বাটনে চাপ দিন!"; 
            return; 
        }
        
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        document.getElementById('status').innerText = "এনালাইসিস হচ্ছে...";
        
        Tesseract.recognize(canvas, 'eng').then(({ data: { text } }) => {
            let nums = text.match(/\d/g);
            if (nums) {
                let val = parseInt(nums[nums.length - 1]);
                processPrediction(val);
            } else {
                document.getElementById('status').innerText = "নাম্বার পাওয়া যায়নি!";
            }
        });
    }

    // প্রেডিকশন লজিক
    function processPrediction(val) {
        let cycle = Math.floor((Date.now() / 90000) % 2);
        let prediction = (val + 3) % 10;
        if (cycle === 1) prediction = 9 - prediction;
        let type = (prediction >= 5) ? "BIG" : "SMALL";
        document.getElementById('result-display').innerText = `${prediction} (${type})`;
        document.getElementById('status').innerText = "আপডেট হয়েছে";
    }
</script>
</body>
</html>
